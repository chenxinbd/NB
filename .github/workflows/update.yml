name: Update Stock
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python fetch.py
        env:
          UPSTREAM_URL: ${{ secrets.UPSTREAM_URL }}
          PRICE_RULES: ${{ secrets.PRICE_RULES }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 自动更新库存数据
